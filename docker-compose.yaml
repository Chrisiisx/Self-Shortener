services:
  app:
    container_name: server
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      - SERVER_PORT=${SERVER_PORT}
    volumes:
      - ./app:/app
      - ./app/data:/app/data
      - shared:/shared
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
    networks:
      - internal

  cloudflared:
    container_name: cloudflare
    image: cloudflare/cloudflared
    command: tunnel --url http://server:${SERVER_PORT}
    networks:
      - internal

  tunnel-helper:
    image: alpine
    container_name: helper
    depends_on:
      - cloudflared
    volumes:
      - shared:/shared
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - internal
    command:
      - sh
      - -c
      - |
        apk add --no-cache docker-cli &&
        echo 'Waiting for tunnel URL...' &&
        until docker logs cloudflare 2>&1 | grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' > /shared/tunnel_url.txt && [ -s /shared/tunnel_url.txt ]; do
          sleep 1
        done &&
        echo 'URL found!' &&
        cat /shared/tunnel_url.txt
    healthcheck:
      test: ["CMD", "test", "-s", "/shared/tunnel_url.txt"]
      interval: 2s
      timeout: 5s
      retries: 30

networks:
  internal:
    driver: bridge

volumes:
  shared: